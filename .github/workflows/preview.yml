name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true # newer pushes supersede stale preview builds

permissions:
  contents: read
  pull-requests: write # needed to post the comment
  statuses: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install + gates + OpenNext build (shared composite action).
      - uses: ./.github/actions/build-and-test
        with:
          supabase-url: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload preview version
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload

      # Derive the worker name from wrangler.jsonc so the URL pattern never drifts
      # from the deployed worker.
      - name: Read worker name
        id: wrangler
        run: |
          NAME=$(node -e "const fs=require('fs');const raw=fs.readFileSync('wrangler.jsonc','utf8').replace(/\/\*[\s\S]*?\*\//g,'').replace(/(^|[^:])\/\/.*\$/gm,'\$1');console.log(JSON.parse(raw).name)")
          if [ -z "$NAME" ]; then
            echo "::error::Could not read worker name from wrangler.jsonc"
            exit 1
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Extract preview URL
        id: url
        env:
          CMD_OUTPUT: ${{ steps.preview.outputs.command-output }}
          WORKER_NAME: ${{ steps.wrangler.outputs.name }}
        run: |
          URL=$(echo "$CMD_OUTPUT" | grep -oE "https://[a-z0-9-]*-${WORKER_NAME}[^ ]*\.workers\.dev" | head -1)
          if [ -z "$URL" ]; then
            echo "::error::Could not extract a preview URL for worker '${WORKER_NAME}' from the wrangler output."
            exit 1
          fi
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.url.outputs.preview_url }}";
            const marker = "<!-- cf-preview -->";
            const body = `${marker}\n🚀 **Preview deployed:** ${url}\n\nBuilt from ${context.payload.pull_request.head.sha.slice(0,7)}.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: "success", context: "cloudflare/preview",
              description: "Preview ready", target_url: url,
            });
