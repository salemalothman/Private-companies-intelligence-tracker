name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false # never kill a half-finished production deploy

permissions:
  contents: read
  statuses: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install + gates + OpenNext build (shared composite action).
      - uses: ./.github/actions/build-and-test
        with:
          supabase-url: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          supabase-anon-key: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      # Derive the worker name from wrangler.jsonc so the status URL never drifts
      # from the deployed worker.
      - name: Read worker name
        id: wrangler
        run: |
          NAME=$(node -e "const fs=require('fs');const raw=fs.readFileSync('wrangler.jsonc','utf8').replace(/\/\*[\s\S]*?\*\//g,'').replace(/(^|[^:])\/\/.*\$/gm,'\$1');console.log(JSON.parse(raw).name)")
          if [ -z "$NAME" ]; then
            echo "::error::Could not read worker name from wrangler.jsonc"
            exit 1
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      # Post the live URL back onto the commit in the GitHub UI.
      - name: Commit status with deployment URL
        uses: actions/github-script@v7
        env:
          WORKER_NAME: ${{ steps.wrangler.outputs.name }}
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "success",
              context: "cloudflare/production",
              description: "Deployed to Cloudflare Workers",
              target_url: `https://${process.env.WORKER_NAME}.salem-alothman.workers.dev`,
            });
