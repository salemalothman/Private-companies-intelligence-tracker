name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false # never kill a half-finished production deploy

permissions:
  contents: read
  statuses: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Quality gates — a failed gate blocks the deploy
      - run: npx tsc --noEmit
      - run: npx tsc -p worker # typecheck the Workers entrypoint (excluded from root tsc)
      - run: npm run lint
      - run: npm run test

      # OpenNext build (Next.js build + Workers bundling)
      - run: npx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      # Post the live URL back onto the commit in the GitHub UI
      - name: Commit status with deployment URL
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "success",
              context: "cloudflare/production",
              description: "Deployed to Cloudflare Workers",
              target_url: "https://private-companies-tracker.salem-alothman.workers.dev",
            });
